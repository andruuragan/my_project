server {
    listen 80;
    server_name dymsystems.pp.ua;

    return 301 http://www.dymsystems.pp.ua$request_uri;
}

server {
    listen 80;
    server_name www.dymsystems.pp.ua localhost 127.0.0.1;

    root /var/www/public;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass app:9000;

        fastcgi_param SCRIPT_FILENAME /var/www/public$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT /var/www/public;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}